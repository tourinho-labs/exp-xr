name: CI - Tag

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  ci:
    permissions:
      contents: write
      security-events: write
      actions: read
      packages: write
      id-token: write
    uses: TourinhoM/org-ci-platform/.github/workflows/ci-tag.yml@main
    # Explícito (não `inherit`): o reusable está em outra org (TourinhoM) e
    # `secrets: inherit` NÃO atravessa orgs — chega vazio. Necessário pra a
    # promoção cross-repo (RELEASE_APP) funcionar nos apps da tourinho-labs.
    secrets:
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
