name: Render GitOps

# Caminho B do workload experiment: a intenção vira um App XR; quem compõe
# os recursos no cluster é o Crossplane (composition app.platform.lab).
on:
  push:
    branches:
      - main
    paths:
      - service.yaml

jobs:
  render:
    permissions:
      contents: read

    uses: TourinhoM/org-ci-platform/.github/workflows/render-gitops.yml@main

    with:
      engine: xr

    # Explícito (não `inherit`): o reusable está em outra org (TourinhoM) e
    # `secrets: inherit` NÃO atravessa orgs — chega vazio. Necessário pra
    # escrita cross-repo (RELEASE_APP) no gitops-<app>.
    secrets:
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
